# ============================================================
# Kubernetes ServiceAccount — Cloud SQL Proxy Workload Identity
# Maps K8s SA "cloudsql-proxy-sa" → GCP SA "doc-system-gke-sa@project.iam.gserviceaccount.com"
#
# HOW IT WORKS:
#   1. Terraform creates GCP SA (gke_sa) with IAM role "cloudsql.client"
#   2. Terraform creates IAM binding: workloadIdentityUser + this K8s SA
#   3. This K8s SA annotation links it to the GCP SA
#   4. Cloud SQL Proxy sidecar uses K8s SA token → GCP SA credentials → Cloud SQL
#
# CI/CD NOTE: The GCP SA email is injected at deploy time via sed:
#   sed -i "s|{{ GKE_SA_EMAIL }}|${GKE_SA_EMAIL}|g" k8s/service-account.yaml
# ============================================================

apiVersion: v1
kind: ServiceAccount
metadata:
  name: cloudsql-proxy-sa
  namespace: doc-system
  labels:
    app: doc-backend
    tier: application
  # IMPORTANT: Replace {{ GKE_SA_EMAIL }} with actual value before deploy
  # Value: terraform output gke_service_account_email
  annotations:
    iam.gke.io/gcp-service-account: "{{ GKE_SA_EMAIL }}"
