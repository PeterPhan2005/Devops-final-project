# ============================================================
# Backend Deployment — Spring Boot + Cloud SQL Proxy + NFS
# ============================================================
# Architecture:
#   Cloud SQL Proxy sidecar ──► Cloud SQL (private IP) via Workload Identity
#   Backend (Spring Boot)     ──► Cloud SQL via localhost:5432 (Unix socket or TCP)
#   Backend (Spring Boot)     ──► /app/uploads via NFS (Filestore RWX)
# ============================================================

apiVersion: apps/v1
kind: Deployment
metadata:
  name: doc-backend
  namespace: doc-system
spec:
  # HPA can now scale to multiple replicas because PVC is ReadWriteMany (Filestore NFS)
  replicas: 1
  selector:
    matchLabels:
      app: doc-backend

  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0

  template:
    metadata:
      labels:
        app: doc-backend

    spec:
      # ── 1. ServiceAccount for Workload Identity (Cloud SQL Proxy) ──
      # Annotation maps this K8s SA → GCP SA (doc-system-gke-sa)
      # Set during CI/CD deploy via sed: annotation value comes from terraform output
      serviceAccountName: cloudsql-proxy-sa

      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        fsGroup: 1000

      # ── 2. Containers ────────────────────────────────────────
      containers:

        # ── 2a. Cloud SQL Proxy sidecar ──────────────────────
        # Authenticates to Cloud SQL via Workload Identity (no credentials file needed)
        # Listens on localhost:5432 and proxies to Cloud SQL private IP
        - name: cloudsql-proxy
          image: gcr.io/cloudsql-docker/community-gce-sidecar:1.21.1
          imagePullPolicy: Always

          # SQLINSTANCE from Secret (recommended for prod)
          env:
            - name: SQLINSTANCE
              valueFrom:
                secretKeyRef:
                  name: doc-system-secret
                  key: SQLINSTANCE
            - name: SQL_PORT
              value: "5432"
            - name: SQL_PROXY_FLAGS
              value: "-ip_address_types=PRIVATE"

          ports:
            - containerPort: 5432
              name: postgres

          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"

          securityContext:
            runAsNonRoot: true
            runAsUser: 2     # cloudsql-proxy runs as non-root user

        # ── 2b. Spring Boot Backend ──────────────────────────
        - name: backend
          # CI/CD will update this tag via sed
          image: us-central1-docker.pkg.dev/serious-physics-477417-i8/doc-system-repo/doc-backend:v2
          imagePullPolicy: Always

          ports:
            - containerPort: 8080
              name: http

          envFrom:
            - configMapRef:
                name: doc-system-config
            - secretRef:
                name: doc-system-secret

          # Mount NFS volume for document uploads (Filestore RWX)
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads

          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 5

          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"

      # ── 3. Volumes ──────────────────────────────────────────
      volumes:
        # NFS shared volume (Filestore ReadWriteMany) — multiple pods can mount simultaneously
        - name: uploads
          persistentVolumeClaim:
            claimName: doc-system-uploads

---
# Backend Service — ClusterIP with BackendConfig for GCLB health checks
apiVersion: v1
kind: Service
metadata:
  name: doc-backend-svc
  namespace: doc-system
  annotations:
    cloud.google.com/backend-config: '{"ports": {"80":"backend-backend"}}'
    cloud.google.com/neg: '{"ingress": true}'
spec:
  type: ClusterIP
  selector:
    app: doc-backend
  ports:
    - port: 80
      targetPort: 8080
      name: http
