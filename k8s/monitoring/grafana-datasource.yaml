# Sidecar sẽ tự động đọc file này từ /etc/grafana/provisioning/datasources/
# Filename phải kết thúc bằng "datasources.yaml" để sidecar nhận diện
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
  labels:
    grafana_datasource: "1"
data:
  prometheus-datasources.yaml: |
    apiVersion: 1
    deleteDatasources:
      - name: Prometheus
        uid: prometheus
    datasources:
      # Prometheus chính từ kube-prometheus-stack
      - name: Prometheus
        type: prometheus
        uid: prometheus
        access: proxy
        url: http://prometheus.monitoring.svc:9090
        isDefault: true
        jsonData:
          httpMethod: POST
          timeInterval: 15s
          manageAlerts: true
          prometheusType: Prometheus
        editable: false
