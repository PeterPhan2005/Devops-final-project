# ============================================================
# BackendConfig — Grafana health check for GCLB
# Required for GKE Ingress to perform health checks on Grafana
# Service annotation cloud.google.com/backend-config references this
# ============================================================
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: grafana-backend
  namespace: monitoring
spec:
  healthCheck:
    checkIntervalSec: 10
    timeoutSec: 5
    healthyThreshold: 2
    unhealthyThreshold: 3
    type: HTTP
    requestPath: /api/health
    port: 80
