# ============================================================
# Grafana Ingress — HTTPS via GKE Ingress + ManagedCertificate
# Requires: Static IP "grafana-ip" (created in terraform/vpc/main.tf)
# DNS: A record grafana.peterphan.online → <terraform output grafana_static_ip>
# ============================================================

apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana-ingress
  namespace: monitoring
  annotations:
    kubernetes.io/ingress.class: "gce"
    networking.gke.io/static-ip-name: "grafana-ip"
    # HTTP must be allowed for GKE health checks and SSL cert provisioning
    kubernetes.io/ingress.allow-http: "true"
    networking.gke.io/managed-certificates: "grafana-cert"
spec:
  ingressClassName: gce
  rules:
    - host: grafana.peterphan.online
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: grafana
                port:
                  number: 80

---
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: grafana-cert
  namespace: monitoring
spec:
  domains:
    - grafana.peterphan.online

