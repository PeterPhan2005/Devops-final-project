# ============================================================
# Secret — Sensitive configuration for Doc System
# All values should be managed via sealed-secrets or external secret manager in prod
# ============================================================

apiVersion: v1
kind: Secret
metadata:
  name: doc-system-secret
  namespace: doc-system
type: Opaque
stringData:
  # PostgreSQL password (used by Spring Boot via SPRING_DATASOURCE_PASSWORD env)
  SPRING_DATASOURCE_PASSWORD: "docpass"

  # Cloud SQL connection name — used by Cloud SQL Proxy sidecar
  # Format: PROJECT:REGION:INSTANCE
  # Get from: terraform output sql_connection_name
  SQLINSTANCE: "serious-physics-477417-i8:us-central1:doc-system-postgres"
