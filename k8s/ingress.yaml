apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: frontend-backend
  namespace: doc-system
spec:
  healthCheck:
    type: HTTP
    port: 80
    requestPath: /
---
apiVersion: cloud.google.com/v1
kind: BackendConfig
metadata:
  name: backend-backend
  namespace: doc-system
spec:
  healthCheck:
    type: HTTP
    port: 8080
    requestPath: /actuator/health
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: doc-system-ingress
  namespace: doc-system
  annotations:
    kubernetes.io/ingress.class: "gce"
    # Managed SSL Certificate (Google tự động cấp và renew)
    networking.gke.io/managed-certificates: "doc-system-cert"
    # Static IP đã reserve
    kubernetes.io/ingress.global-static-ip-name: "doc-system-ip"
    # Redirect HTTP to HTTPS
    kubernetes.io/ingress.allow-http: "false"
spec:
  rules:
    - host: devops.peterphan.online
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: doc-backend-svc
                port:
                  number: 80
          - path: /uploads
            pathType: Prefix
            backend:
              service:
                name: doc-backend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: doc-frontend-svc
                port:
                  number: 80
---
# Managed SSL Certificate
apiVersion: networking.gke.io/v1
kind: ManagedCertificate
metadata:
  name: doc-system-cert
  namespace: doc-system
spec:
  domains:
    - devops.peterphan.online
