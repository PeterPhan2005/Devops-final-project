name: Frontend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'k8s/**'              # Re-deploy k8s manifests (incl. frontend image tag) when k8s files change
  pull_request:
    branches: [main]
    paths:
      - 'frontend/**'
      - 'k8s/**'
  workflow_dispatch:

env:
  REGISTRY: us-central1-docker.pkg.dev/serious-physics-477417-i8/doc-system-repo
  IMAGE_NAME: doc-frontend
  GAR_REGION: us-central1
  PROJECT_ID: serious-physics-477417-i8
  WORKLOAD_PROVIDER: projects/680857674639/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      # ── CodeQL SAST — scan JavaScript/TypeScript source for security issues ──
      # Detects: XSS, code injection, path traversal, hardcoded secrets, etc.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci
        working-directory: ./frontend

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:javascript-typescript"

      - name: Lint
        run: npm run lint || true
        working-directory: ./frontend

      - name: Test
        run: npm run test
        working-directory: ./frontend

      - name: Generate Coverage Report
        run: npm run test:coverage || true
        working-directory: ./frontend

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./frontend/coverage/lcov.info
          flags: frontend
          name: frontend-coverage
          fail_ci_if_error: false

      - name: Build
        run: npm run build
        working-directory: ./frontend

  security-scan:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: ./frontend

      # ── 1) Secret scan — detect hardcoded tokens, API keys, env vars in source ──
      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './frontend'
          format: 'sarif'
          output: 'trivy-secrets.sarif'
          exit-code: '1'          # ← FAIL if any secret detected
          scanners: 'secret'

      # ── 2) Dependency audit — report only (dev dependency vulnerabilities)
      # Note: vite/esbuild/vitest are dev dependencies. Fixing them requires
      # breaking version bumps (vite 8.x). Set continue-on-error: true to allow
      # the pipeline to proceed. Trivy catches production CVEs in the image scan.
      - name: npm audit
        continue-on-error: true
        run: npm audit --audit-level=high
        working-directory: ./frontend

      # Build Docker image (after node_modules are ready)
      - name: Build Docker image
        run: docker build ./frontend -t frontend-scan:latest

      # ── 3) Docker image scan — base image CVEs (report-only) ──
      # Set exit-code: 0 (report-only). Base image OS CVEs (Alpine, eclipse-temurin)
      # are not the app developer's responsibility — they are the image maintainer's.
      # Production dependency CVEs are caught by Trivy dependency scan.
      - name: Trivy Docker image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'frontend-scan:latest'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          scanners: 'vuln'
          ignore-unfixed: true

      # ── Upload all scan results to GitHub Security tab ──
      - name: Upload secret scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-secrets.sarif'
          category: trivy/secret-scan

      - name: Upload Docker image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: trivy/image-scan

  push:
    runs-on: ubuntu-latest
    needs: [ci, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install & Build
        run: |
          npm ci
          npm run build
        working-directory: ./frontend

      # Use Workload Identity Federation (recommended by Google)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build ./frontend -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          docker build ./frontend -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  deploy:
    runs-on: ubuntu-latest
    needs: push
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      # Use Workload Identity Federation (recommended by Google)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Setup kubectl
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --region=${{ env.GAR_REGION }} --project=${{ env.PROJECT_ID }}

      - name: Deploy to GKE
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          # ── 1) Create namespace ──────────────────────────────────
          kubectl apply -f k8s/namespace.yaml

          # ── 2) Monitoring stack via Helm (idempotent: install or upgrade) ──
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          # First: delete any stale helm release secret that can cause
          # "another operation is in progress" errors from previous cancelled runs.
          kubectl delete secret -n monitoring -l "owner=helm" 2>/dev/null || true

          # Install without --wait: CSI WaitForFirstConsumer provisioner can take 3-5 min
          # to bind the GCE PD for the Grafana PVC, causing helm --wait to falsely fail.
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f k8s/monitoring/prometheus-values.yaml \
            --reset-values \
            || {
              # If install fails, clear stale secrets and retry once.
              echo "Helm install failed — clearing stale secrets and retrying..."
              kubectl delete secret -n monitoring -l "owner=helm" 2>/dev/null || true
              helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
                --namespace monitoring \
                --create-namespace \
                -f k8s/monitoring/prometheus-values.yaml \
                --reset-values
            }

          # Poll until all critical monitoring pods are ready (up to 5 min for CSI PVC bind)
          echo "Waiting for monitoring stack pods to become ready..."
          kubectl wait --for=condition=ready pod -n monitoring -l "app.kubernetes.io/name=alertmanager" --timeout=300s 2>/dev/null || true
          kubectl wait --for=condition=ready pod -n monitoring -l "app.kubernetes.io/name=prometheus,app.kubernetes.io/component=server" --timeout=300s 2>/dev/null || true
          kubectl wait --for=condition=ready pod -n monitoring -l "app.kubernetes.io/name=grafana,release=prometheus" --timeout=300s 2>/dev/null || true
          echo "Monitoring stack ready."

          # ── 3) PrometheusOperator CRDs ───────────────────────────────
          # Note: grafana-datasource.yaml removed — datasource provisioned by
          # prometheus-values.yaml sidecar (grafana.sidecar.datasources.enabled: true)
          kubectl apply -f k8s/monitoring/app-dashboard.yaml
          kubectl apply -f k8s/monitoring/app-service-monitor.yaml
          kubectl apply -f k8s/monitoring/prometheus-rules.yaml

          # ── 4) Application configs ─────────────────────────────────
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml
          kubectl apply -f k8s/storage.yaml

          # ── 5) HPA ─────────────────────────────────────────────────
          kubectl apply -f k8s/hpa.yaml

          # ── 6) Frontend — clean up old ReplicaSets before deploying ──
          # Old RSes (with wrong image tags) block rollout by keeping desired=1
          # and competing for cluster node resources.
          echo "Cleaning up old frontend ReplicaSets..."
          kubectl scale deployment doc-frontend -n doc-system --replicas=0 2>/dev/null || true
          kubectl wait --for=delete pod -n doc-system -l app=doc-frontend --timeout=60s 2>/dev/null || true
          sleep 5
          kubectl delete rs -n doc-system -l app=doc-frontend 2>/dev/null || true

          # ── 7) Frontend deployment ─────────────────────────────────
          sed -i "s|doc-frontend:[a-zA-Z0-9._-]*|doc-frontend:${SHORT_SHA}|" k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-deployment.yaml

          # ── 7) Ingress + ManagedCertificate (HTTPS) ────────────────
          kubectl apply -f k8s/ingress.yaml

          # ── 8) Grafana ingress + ManagedCertificate ───────────────
          kubectl apply -f k8s/monitoring/grafana-ingress.yaml

      - name: Verify deployment
        run: kubectl rollout status deployment/doc-frontend -n doc-system --timeout=300s
