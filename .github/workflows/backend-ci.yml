name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/**'   # ← Trigger khi workflow file thay đổi
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/**'
  # Allow manual trigger to re-run just terraform (skip CI jobs for speed)
  workflow_dispatch:
    inputs:
      skip_terraform:
        description: 'Skip Terraform apply (plan only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      terraform_target:
        description: 'Target specific module (leave empty for all)'
        required: false
        default: ''
        type: string

env:
  REGISTRY: us-central1-docker.pkg.dev/serious-physics-477417-i8/doc-system-repo
  IMAGE_NAME: doc-backend
  GAR_REGION: us-central1
  PROJECT_ID: serious-physics-477417-i8
  WORKLOAD_PROVIDER: projects/680857674639/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      contents: read
      actions: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # ── CodeQL SAST — scan Java source code for security vulnerabilities ──
      # Detects: SQL injection, XXE, deserialization, path traversal, etc.
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended   # ← More comprehensive than default security query

      - name: Build
        run: mvn clean package -DskipTests
        working-directory: ./backend

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: "/language:java"   # ← Unique category so Trivy SARIF uploads don't conflict

      - name: Test
        run: mvn test
        working-directory: ./backend

      - name: Generate Coverage Report
        run: mvn jacoco:report
        working-directory: ./backend

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: ./backend/target/site/jacoco/jacoco.xml
          flags: backend
          name: backend-coverage
          fail_ci_if_error: false

  security-scan:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      # Build JAR first (needed for dependency + secret scans)
      - name: Build JAR
        run: mvn package -DskipTests -B
        working-directory: ./backend

      # ── 1) Secret scan FIRST — detect hardcoded credentials, API keys, tokens ──
      # FAIL immediately if any secret is found (e.g. .env committed to repo)
      - name: Trivy secret scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-secrets.sarif'
          exit-code: '1'          # ← FAIL if any secret detected
          scanners: 'secret'

      # ── 2a) Dependency scan — see EXACT CVEs in pipeline log (always passes) ──
      # Look at the Actions log for this step to see which JARs have vulnerabilities
      - name: Trivy dependency scan (report — see CVE details)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './backend/target'
          format: 'table'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'
          scanners: 'vuln'
          ignore-unfixed: true
          vuln-type: 'library'    # Only scan JAR/library CVEs, skip OS packages

      # ── 2b) Dependency scan — SARIF for GitHub Security + enforce FAIL on CVEs ──
      # If this step fails: check GitHub → Security → Vulnerability alerts for CVE IDs
      - name: Trivy dependency vulnerability scan (enforce)
        uses: aquasecurity/trivy-action@0.35.0
        with:
          scan-type: 'fs'
          scan-ref: './backend/target'
          format: 'sarif'
          output: 'trivy-dep-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'           # ← FAIL pipeline on CRITICAL/HIGH CVEs
          scanners: 'vuln'
          ignore-unfixed: true
          vuln-type: 'library'

      # Build Docker image (after JAR is ready, BEFORE image scan)
      - name: Build Docker image
        run: docker build ./backend -t backend-scan:latest

      # ── 3) Docker image scan — base image CVEs (eclipse-temurin, alpine) ──
      # Report-only (exit-code 0) — base image OS CVEs are not app-developer's responsibility
      - name: Trivy Docker image scan
        uses: aquasecurity/trivy-action@0.35.0
        with:
          image-ref: 'backend-scan:latest'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL,HIGH'
          exit-code: '0'            # ← Report-only
          scanners: 'vuln'
          ignore-unfixed: true

      # ── Upload ALL scan results to GitHub Security tab (always, even on failure) ──
      - name: Upload secret scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-secrets.sarif'
          category: trivy/secret-scan

      - name: Upload dependency scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-dep-results.sarif'
          category: trivy/dependency-scan

      - name: Upload Docker image scan results
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-image-results.sarif'
          category: trivy/image-scan

  push:
    runs-on: ubuntu-latest
    needs: [ci, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn package -DskipTests
        working-directory: ./backend

      # Use Workload Identity Federation (recommended by Google)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build ./backend -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          docker build ./backend -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  terraform:
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      # Authenticate via Workload Identity (same SA used for GKE + Terraform)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      # Setup Terraform
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      # Initialize and apply Terraform (idempotent — only applies changes)
      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=doc-system-terraform-state-pete" \
            -backend-config="prefix=prod"

      # Remove stale state lock from previous failed/crashed CI runs.
      # This is safe in CI because only one run executes at a time and
      # the lock holder from the crashed run no longer exists.
      - name: Terraform Force Unlock (stale lock)
        run: |
          echo "Removing stale state lock..."
          gcloud storage rm gs://doc-system-terraform-state-pete/prod/default.tflock 2>/dev/null || true
          echo "Lock removed or not present."

      - name: Terraform Plan
        working-directory: ./terraform
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_db_password: ${{ secrets.TERRAFORM_DB_PASSWORD }}
        run: |
          TARGET="${{ github.event.inputs.terraform_target }}"
          if [ -n "$TARGET" ]; then
            terraform plan -no-color -target="$TARGET"
          else
            terraform plan -no-color
          fi

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_project_id: ${{ env.PROJECT_ID }}
          TF_VAR_db_password: ${{ secrets.TERRAFORM_DB_PASSWORD }}
        run: |
          # Skip apply if manually triggered with skip_terraform=true (plan-only mode)
          if [ "${{ github.event.inputs.skip_terraform }}" == "true" ]; then
            echo "Skipping apply (plan-only mode)"
          else
            TARGET="${{ github.event.inputs.terraform_target }}"
            if [ -n "$TARGET" ]; then
              terraform apply -auto-approve -no-color -target="$TARGET"
            else
              terraform apply -auto-approve -no-color
            fi
          fi

      # Export structured outputs for use by the deploy job (jq-parsed, not grep)
      # Only run if terraform was actually applied
      - name: Export Terraform outputs
        if: github.event.inputs.skip_terraform != 'true'
        working-directory: ./terraform
        run: |
          terraform output -json > outputs.json
          gcloud storage cp outputs.json gs://doc-system-terraform-state-pete/prod/outputs.json

  deploy:
    runs-on: ubuntu-latest
    needs: [terraform, ci]
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      # ── 1) Authenticate to GCP via Workload Identity ───────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      # ── 2) Setup kubectl + get GKE credentials ──────────────────
      - name: Setup kubectl
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --region=${{ env.GAR_REGION }} --project=${{ env.PROJECT_ID }}

      # ── 3) Fetch Terraform outputs (Filestore IP + GKE SA email) ──
      - name: Download Terraform outputs
        run: |
          # Prefer outputs.json (structured JSON from terraform output -json)
          # Fallback to .tfstate if outputs.json not yet generated
          gcloud storage cp gs://doc-system-terraform-state-pete/prod/outputs.json /tmp/outputs.json || \
            gcloud storage cp gs://doc-system-terraform-state-pete/prod/default.tfstate /tmp/terraform.tfstate

      - name: Extract Terraform outputs
        run: |
          # Download outputs.json from GCS (structured, versioned, easier to parse than .tfstate)
          gcloud storage cp gs://doc-system-terraform-state-pete/prod/outputs.json /tmp/outputs.json || \
            gcloud storage cp gs://doc-system-terraform-state-pete/prod/default.tfstate /tmp/terraform.tfstate

          # Parse using jq (robust — no regex fragility)
          if [ -f /tmp/outputs.json ]; then
            GKE_SA_EMAIL=$(jq -r '.gke_service_account_email.value' /tmp/outputs.json)
            FILESTORE_IP=$(jq -r '.filestore_nfs_ip.value' /tmp/outputs.json)
          else
            # Fallback: parse from .tfstate (legacy)
            GKE_SA_EMAIL=$(grep -oP '"gke_service_account_email"[^}]*value = "\K[^"]+' /tmp/terraform.tfstate)
            FILESTORE_IP=$(grep -oP '"filestore_nfs_ip"[^}]*value = "\K[^"]+' /tmp/terraform.tfstate)
          fi

          echo "GKE_SA_EMAIL=$GKE_SA_EMAIL"
          echo "GKE_SA_EMAIL=$GKE_SA_EMAIL" >> $GITHUB_ENV
          echo "FILESTORE_IP=$FILESTORE_IP"
          echo "FILESTORE_IP=$FILESTORE_IP" >> $GITHUB_ENV

      # ── 4) Inject dynamic values into Kubernetes manifests ──────
      - name: Prepare K8s manifests
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          # Inject backend image tag
          sed -i "s|doc-backend:[a-zA-Z0-9._-]*|doc-backend:${SHORT_SHA}|" k8s/backend-deployment.yaml

          # Inject GKE SA email into K8s ServiceAccount (Workload Identity binding)
          sed -i "s|{{ GKE_SA_EMAIL }}|${GKE_SA_EMAIL}|g" k8s/service-account.yaml

          # Inject Filestore NFS IP into PersistentVolume
          sed -i "s|<filestore-ip>|${FILESTORE_IP}|g" k8s/nfs-pv.yaml

      # ── 5) Deploy to GKE (order matters!) ─────────────────────
      - name: Deploy to GKE
        run: |
          # ── 5a) Create namespace ──────────────────────────────────
          kubectl apply -f k8s/namespace.yaml

          # ── 5b) ServiceAccount (Workload Identity binding) ─────────
          kubectl apply -f k8s/service-account.yaml

          # ── 5c) NFS PV + PVC (Filestore) ─────────────────────────
          # The PV/PVC may still exist from a previous partial run.
          # If they already have the correct RWX spec, just patch finalizers and skip.
          # If they have the wrong RWO spec, we need to delete and recreate.
          #
          # Check current PVC accessMode
          CURRENT_MODE=$(kubectl get pvc doc-system-uploads -n doc-system \
            -o jsonpath='{.spec.accessModes[0]}' 2>/dev/null || echo "NOT_FOUND")
          if [ "$CURRENT_MODE" = "ReadWriteMany" ]; then
            echo "PVC already has correct ReadWriteMany mode — skipping PV/PVC step"
          else
            echo "PVC has wrong mode ($CURRENT_MODE) or not found — recreating with RWX"
            # Patch finalizers to unstick any Terminating PVC
            kubectl patch pvc/doc-system-uploads -n doc-system \
              -p '{"metadata":{"finalizers":null}}' --type=merge 2>/dev/null || true
            # Delete PVC first (releases claim on PV)
            kubectl delete pvc/doc-system-uploads -n doc-system --wait=true 2>/dev/null || true
            # Delete PV (with Retain policy, data stays on Filestore)
            kubectl delete pv/doc-system-uploads-pv --wait=true 2>/dev/null || true
            sleep 5   # Extra settle time for API propagation
            # Create fresh with correct RWX
            kubectl apply -f k8s/nfs-pv.yaml
            kubectl apply -f k8s/storage.yaml
          fi

          # ── 5e) Monitoring stack via Helm ───────────────────────────
          helm repo add prometheus-community https://prometheus-community.github.io/helm-charts
          helm repo update

          # First: delete any stale helm release secret that can cause
          # "another operation is in progress" errors from previous cancelled runs.
          kubectl delete secret -n monitoring -l "owner=helm" 2>/dev/null || true

          # Install without --wait: CSI WaitForFirstConsumer provisioner can take 3-5 min
          # to bind the GCE PD for the Grafana PVC, causing helm --wait to falsely fail.
          # We poll pods separately after the install.
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f k8s/monitoring/prometheus-values.yaml \
            --reset-values \
            || {
              # If install fails, clear stale secrets and retry once.
              echo "Helm install failed — clearing stale secrets and retrying..."
              kubectl delete secret -n monitoring -l "owner=helm" 2>/dev/null || true
              helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
                --namespace monitoring \
                --create-namespace \
                -f k8s/monitoring/prometheus-values.yaml \
                --reset-values
            }

          # Poll until all critical monitoring pods are ready (up to 5 min for CSI PVC bind)
          echo "Waiting for monitoring stack pods to become ready..."
          kubectl wait --for=condition=ready pod -n monitoring -l "app.kubernetes.io/name=alertmanager" --timeout=300s 2>/dev/null || true
          kubectl wait --for=condition=ready pod -n monitoring -l "app.kubernetes.io/name=prometheus,app.kubernetes.io/component=server" --timeout=300s 2>/dev/null || true
          kubectl wait --for=condition=ready pod -n monitoring -l "app.kubernetes.io/name=grafana,release=prometheus" --timeout=300s 2>/dev/null || true
          echo "Monitoring stack ready."

          # ── 5f) Monitoring CRDs ─────────────────────────────────────
          # Note: grafana-datasource.yaml removed — datasource provisioned by
          # prometheus-values.yaml sidecar (grafana.sidecar.datasources.enabled: true)
          kubectl apply -f k8s/monitoring/app-dashboard.yaml
          kubectl apply -f k8s/monitoring/app-service-monitor.yaml
          kubectl apply -f k8s/monitoring/prometheus-rules.yaml

          # ── 5g) Application configs ──────────────────────────────────
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

          # ── 5h) HPA (HorizontalPodAutoscaler) ────────────────────────
          kubectl apply -f k8s/hpa.yaml

          # ── 5i) Backend deployment (Cloud SQL Proxy + NFS mount) ────
          kubectl apply -f k8s/backend-deployment.yaml

          # ── 5j) Frontend deployment ─────────────────────────────────
          kubectl apply -f k8s/frontend-deployment.yaml

          # ── 5k) Ingress + ManagedCertificate (HTTPS) ─────────────────
          kubectl apply -f k8s/ingress.yaml

          # ── 5l) Grafana ingress + ManagedCertificate ─────────────────
          kubectl apply -f k8s/monitoring/grafana-ingress.yaml

      - name: Verify deployment
        run: kubectl rollout status deployment/doc-backend -n doc-system --timeout=300s
