name: Backend CI/CD

on:
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/**'   # ← Trigger khi workflow file thay đổi
  pull_request:
    branches: [main]
    paths:
      - 'backend/**'
      - 'terraform/**'
      - 'k8s/**'
      - '.github/workflows/**'

env:
  REGISTRY: us-central1-docker.pkg.dev/serious-physics-477417-i8/doc-system-repo
  IMAGE_NAME: doc-backend
  GAR_REGION: us-central1
  PROJECT_ID: serious-physics-477417-i8
  WORKLOAD_PROVIDER: projects/680857674639/locations/global/workloadIdentityPools/github-pool/providers/github-provider

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build
        run: mvn clean package -DskipTests
        working-directory: ./backend

      - name: Test
        run: mvn test
        working-directory: ./backend

  security-scan:
    runs-on: ubuntu-latest
    needs: ci
    permissions:
      security-events: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn package -DskipTests -B
        working-directory: ./backend

      # ── Trivy: scan Maven dependencies via filesystem (no Docker needed) ──
      # - Scans pom.xml + .m2/repository for known CVEs in Java libraries
      # - ignore-unfixed: skip vulns without available patch (OS base image, unmaintained libs)
      # - exit-code '1': FAIL pipeline on CRITICAL vulns with fix available
      # - exit-code '0': pass pipeline for HIGH vulns (reviewed via SARIF in GitHub Security tab)
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './backend'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL'
          exit-code: '1'
          scanners: 'vuln'
          # Skip vulns without available patch — these are not actionable
          # OS base image vulns (Alpine): inherited from JRE image, app team can't patch OS
          ignore-unfixed: true

      # Build Docker image separately (only used by push job, not for scanning)
      - name: Build Docker image
        run: docker build ./backend -t backend-scan:latest

      # ── Container image scan: report only (GitHub Security tab, non-blocking) ──
      - name: Trivy image scan (report only)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: 'backend-scan:latest'
          format: 'sarif'
          output: 'trivy-image-results.sarif'
          severity: 'CRITICAL'
          # OS layer vulns: non-blocking (app team can't patch OS base image)
          exit-code: '0'
          ignore-unfixed: true

      - name: Upload scan results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          # Primary: dependency scan (blocking)
          sarif_file: 'trivy-results.sarif'

  push:
    runs-on: ubuntu-latest
    needs: [ci, security-scan]
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build JAR
        run: mvn package -DskipTests
        working-directory: ./backend

      # Use Workload Identity Federation (recommended by Google)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          docker build ./backend -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          docker build ./backend -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${SHORT_SHA}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  terraform:
    runs-on: ubuntu-latest
    needs: push
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      # Authenticate via Workload Identity (same SA used for GKE + Terraform)
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      # Setup Terraform
      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9"

      # Initialize and apply Terraform (idempotent — only applies changes)
      - name: Terraform Init
        working-directory: ./terraform
        run: |
          terraform init \
            -reconfigure \
            -backend-config="bucket=doc-system-terraform-state-pete" \
            -backend-config="prefix=prod"

      - name: Terraform Plan
        working-directory: ./terraform
        run: terraform plan -no-color || true

      - name: Terraform Apply
        working-directory: ./terraform
        env:
          TF_VAR_db_password: ${{ secrets.TERRAFORM_DB_PASSWORD }}
        run: terraform apply -auto-approve -no-color

  deploy:
    runs-on: ubuntu-latest
    needs: [terraform, ci]
    permissions:
      contents: 'read'
      id-token: 'write'
    steps:
      - uses: actions/checkout@v4

      # ── 1) Authenticate to GCP via Workload Identity ───────────
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ env.WORKLOAD_PROVIDER }}
          service_account: terraform-sa@${{ env.PROJECT_ID }}.iam.gserviceaccount.com

      # ── 2) Setup kubectl + get GKE credentials ──────────────────
      - name: Setup kubectl
        uses: google-github-actions/setup-gcloud@v2

      - name: Install gke-gcloud-auth-plugin
        run: gcloud components install gke-gcloud-auth-plugin --quiet

      - name: Get GKE credentials
        run: |
          gcloud container clusters get-credentials ${{ secrets.GKE_CLUSTER_NAME }} \
            --region=${{ env.GAR_REGION }} --project=${{ env.PROJECT_ID }}

      # ── 3) Fetch Terraform outputs (Filestore IP + GKE SA email) ──
      - name: Download Terraform state
        run: |
          gcloud storage cp gs://doc-system-terraform-state-pete/prod/default.tfstate /tmp/terraform.tfstate

      - name: Extract Terraform outputs
        run: |
          # GKE Service Account email (for Workload Identity annotation on K8s SA)
          GKE_SA_EMAIL=$(grep -oP '"gke_service_account_email"[^}]*value = "\K[^"]+' /tmp/terraform.tfstate)
          echo "GKE_SA_EMAIL=$GKE_SA_EMAIL"
          echo "GKE_SA_EMAIL=$GKE_SA_EMAIL" >> $GITHUB_ENV

          # Filestore NFS IP (for NFS PersistentVolume)
          FILESTORE_IP=$(grep -oP '"filestore_nfs_ip"[^}]*value = "\K[^"]+' /tmp/terraform.tfstate)
          echo "FILESTORE_IP=$FILESTORE_IP"
          echo "FILESTORE_IP=$FILESTORE_IP" >> $GITHUB_ENV

      # ── 4) Inject dynamic values into Kubernetes manifests ──────
      - name: Prepare K8s manifests
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"

          # Inject backend image tag
          sed -i "s|doc-backend:[a-zA-Z0-9._-]*|doc-backend:${SHORT_SHA}|" k8s/backend-deployment.yaml

          # Inject GKE SA email into K8s ServiceAccount (Workload Identity binding)
          sed -i "s|{{ GKE_SA_EMAIL }}|${GKE_SA_EMAIL}|g" k8s/service-account.yaml

          # Inject Filestore NFS IP into PersistentVolume
          sed -i "s|<filestore-ip>|${FILESTORE_IP}|g" k8s/nfs-pv.yaml

      # ── 5) Deploy to GKE (order matters!) ─────────────────────
      - name: Deploy to GKE
        run: |
          # ── 5a) Create namespace ──────────────────────────────────
          kubectl apply -f k8s/namespace.yaml

          # ── 5b) ServiceAccount (Workload Identity binding) ─────────
          kubectl apply -f k8s/service-account.yaml

          # ── 5c) NFS PersistentVolume (Filestore) ────────────────────
          kubectl apply -f k8s/nfs-pv.yaml

          # ── 5d) NFS PVC (must exist before pods start) ──────────────
          kubectl apply -f k8s/storage.yaml

          # ── 5e) Monitoring stack via Helm ───────────────────────────
          helm upgrade --install prometheus prometheus-community/kube-prometheus-stack \
            --namespace monitoring \
            --create-namespace \
            -f k8s/monitoring/prometheus-values.yaml \
            --wait --timeout 5m

          # ── 5f) Monitoring CRDs ─────────────────────────────────────
          kubectl apply -f k8s/monitoring/grafana-datasource.yaml
          kubectl apply -f k8s/monitoring/app-dashboard.yaml
          kubectl apply -f k8s/monitoring/app-service-monitor.yaml
          kubectl apply -f k8s/monitoring/prometheus-rules.yaml

          # ── 5g) Application configs ──────────────────────────────────
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secret.yaml

          # ── 5h) HPA (HorizontalPodAutoscaler) ────────────────────────
          kubectl apply -f k8s/hpa.yaml

          # ── 5i) Backend deployment (Cloud SQL Proxy + NFS mount) ────
          kubectl apply -f k8s/backend-deployment.yaml

          # ── 5j) Frontend deployment ──────────────────────────────────
          kubectl apply -f k8s/frontend-deployment.yaml

          # ── 5k) Ingress + ManagedCertificate (HTTPS) ─────────────────
          kubectl apply -f k8s/ingress.yaml

          # ── 5l) Grafana ingress + ManagedCertificate ─────────────────
          kubectl apply -f k8s/monitoring/grafana-ingress.yaml

      - name: Verify deployment
        run: kubectl rollout status deployment/doc-backend -n doc-system --timeout=300s
