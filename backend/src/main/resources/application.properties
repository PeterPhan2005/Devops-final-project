# Server Configuration
server.port=8080

# PostgreSQL Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/docdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:docuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=${SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=${FORMAT_SQL:false}
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# File Upload Configuration
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=${MAX_FILE_SIZE:50MB}
spring.servlet.multipart.max-request-size=${MAX_REQUEST_SIZE:50MB}

# Upload directory (absolute path, configurable via env)
app.upload.dir=${APP_UPLOAD_DIR:/app/uploads}

# Actuator (for Prometheus monitoring + Alertmanager webhook)
management.endpoints.web.exposure.include=health,info,prometheus,metrics,alerts
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
management.prometheus.metrics.export.enabled=true
