services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: doc-postgres
    environment:
      POSTGRES_DB: docdb
      POSTGRES_USER: docuser
      POSTGRES_PASSWORD: docpass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docuser -d docdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Backend - Spring Boot
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: doc-backend
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/docdb
      SPRING_DATASOURCE_USERNAME: docuser
      SPRING_DATASOURCE_PASSWORD: docpass
      APP_UPLOAD_DIR: /app/uploads
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      # Bind mount: file được lưu trực tiếp vào thư mục ./uploads trong project
      - ./uploads:/app/uploads

  # Frontend - React + Vite
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: doc-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
