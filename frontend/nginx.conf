server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Security headers
    add_header X-Frame-Options        "SAMEORIGIN"          always;
    add_header X-Content-Type-Options "nosniff"             always;
    add_header X-XSS-Protection       "1; mode=block"       always;
    add_header Referrer-Policy         "strict-origin-when-cross-origin" always;

    # Gzip compression
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;
    gzip_min_length 1000;

    # Serve React app (SPA routing)
    location / {
        try_files $uri $uri/ /index.html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy API requests to backend
    location /api/ {
        # In Kubernetes: use Kubernetes internal DNS service name
        # doc-backend-svc = Kubernetes Service name in the same namespace
        resolver kube-dns.kube-system valid=10s;
        set $backend_svc http://doc-backend-svc;
        proxy_pass $backend_svc;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   X-Forwarded-Host  $host;
        proxy_set_header   Origin            $http_origin;
        proxy_set_header   Connection        "";

        # Timeout settings
        proxy_connect_timeout 60s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Body size limit (50MB match with Spring Boot)
        client_max_body_size 50m;
    }

    # Health check endpoint for load balancers
    location /health {
        access_log off;
        return 200 "OK\n";
        add_header Content-Type text/plain;
    }
}
